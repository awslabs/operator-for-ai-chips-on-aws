name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty to use VERSION file)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'
        cache: true
        cache-dependency-path: |
          go.sum
          go.mod

    - name: Read and validate version
      run: |
        echo "Reading version from VERSION file..."
        
        # Use manual input if provided, otherwise read from VERSION file
        if [[ -n "${{ github.event.inputs.version }}" ]]; then
          VERSION="${{ github.event.inputs.version }}"
          echo "Using manually specified version: $VERSION"
        else
          # Validate VERSION file exists and is readable
          if [[ ! -f "VERSION" ]]; then
            echo "Error: VERSION file not found"
            exit 1
          fi
          
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if [[ -z "$VERSION" ]]; then
            echo "Error: VERSION file is empty"
            exit 1
          fi
          
          echo "Found version: $VERSION"
        fi
        
        # Validate version format (basic semantic version check)
        if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: Version '$VERSION' is not a valid semantic version (X.Y.Z)"
          exit 1
        fi
        
        # Check if tag already exists (skip check for manual runs to allow re-runs)
        if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
          if git tag -l "v$VERSION" | grep -q "v$VERSION"; then
            echo "Error: Tag v$VERSION already exists"
            exit 1
          fi
        fi
        
        echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV
        echo "✓ Version validation completed: $VERSION"

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Verify AWS authentication
      run: |
        echo "Verifying AWS authentication..."
        
        # Test AWS credentials
        if ! aws sts get-caller-identity > /dev/null 2>&1; then
          echo "Error: AWS authentication failed"
          exit 1
        fi
        
        echo "✓ AWS authentication successful"

    - name: Login to Amazon ECR Public
      uses: aws-actions/amazon-ecr-login@v2
      with:
        registry-type: public

    - name: Verify ECR authentication
      run: |
        echo "Verifying ECR public registry authentication..."
        
        # Test ECR authentication by attempting to describe repositories
        if ! aws ecr-public describe-repositories --region us-east-1 > /dev/null 2>&1; then
          echo "Error: ECR public registry authentication failed"
          exit 1
        fi
        
        echo "✓ ECR public registry authentication successful"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install OpenShift CLI
      run: |
        echo "Installing OpenShift CLI..."
        
        # Download with retry logic
        for i in {1..3}; do
          if curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz; then
            break
          elif [ $i -eq 3 ]; then
            echo "Error: Failed to download OpenShift CLI after 3 attempts"
            exit 1
          else
            echo "Download attempt $i failed, retrying..."
            sleep 5
          fi
        done
        
        tar -xzf openshift-client-linux.tar.gz
        sudo mv oc /usr/local/bin/
        
        # Verify installation
        if ! oc version --client; then
          echo "Error: OpenShift CLI installation failed"
          exit 1
        fi
        
        echo "✓ OpenShift CLI installed successfully"



    - name: Build and push images
      run: |
        echo "Building and pushing images for version: ${{ env.NEW_VERSION }}"
        
        # Build operator image
        echo "Building operator image..."
        if ! make docker-build PROJECT_VERSION=${{ env.NEW_VERSION }}; then
          echo "Error: Failed to build operator image"
          exit 1
        fi
        echo "✓ Operator image built and pushed successfully"
        
        # Generate bundle
        echo "Generating OLM bundle..."
        if ! make bundle PROJECT_VERSION=${{ env.NEW_VERSION }}; then
          echo "Error: Failed to generate bundle"
          exit 1
        fi
        echo "✓ Bundle generated successfully"
        
        # Build bundle image
        echo "Building bundle image..."
        if ! make bundle-build PROJECT_VERSION=${{ env.NEW_VERSION }}; then
          echo "Error: Failed to build bundle image"
          exit 1
        fi
        echo "✓ Bundle image built and pushed successfully"
        
        # Build index image
        echo "Building index image..."
        if ! make index PROJECT_VERSION=${{ env.NEW_VERSION }}; then
          echo "Error: Failed to build index image"
          exit 1
        fi
        echo "✓ Index image built and pushed successfully"
        
        echo "✓ All images built and pushed successfully"

    - name: Generate release manifests
      run: |
        echo "Generating release manifests for version: ${{ env.NEW_VERSION }}"
        
        if ! make release-manifests PROJECT_VERSION=${{ env.NEW_VERSION }}; then
          echo "Error: Failed to generate release manifests"
          exit 1
        fi
        
        # Validate generated manifests
        EXPECTED_FILES=(
          "release/${{ env.NEW_VERSION }}/aws-neuron-operator.yaml"
          "release/${{ env.NEW_VERSION }}/nfd-rule.yaml"
          "release/${{ env.NEW_VERSION }}/deviceconfig-sample.yaml"
        )
        
        for file in "${EXPECTED_FILES[@]}"; do
          if [[ ! -f "$file" ]]; then
            echo "Error: Missing expected manifest file: $file"
            exit 1
          fi
          
          if [[ ! -s "$file" ]]; then
            echo "Error: Manifest file is empty: $file"
            exit 1
          fi
          
          echo "✓ Validated: $file"
        done
        
        echo "✓ Release manifests generated and validated successfully"

    - name: Update Helm chart version
      run: |
        echo "Updating Helm chart to version ${{ env.NEW_VERSION }}..."
        CHART_FILE="deploy/helm/aws-neuron-operator/Chart.yaml"
        sed -i "s/^version:.*/version: ${{ env.NEW_VERSION }}/" "$CHART_FILE"
        sed -i "s/^appVersion:.*/appVersion: \"${{ env.NEW_VERSION }}\"/" "$CHART_FILE"
        echo "✓ Helm chart updated"

    - name: Commit and tag
      run: |
        echo "Configuring git and creating release tag..."
        
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        CURRENT_BRANCH=$(git branch --show-current)
        echo "Current branch: $CURRENT_BRANCH"
        
        # Delete existing tag if this is a manual re-run
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          if git tag -l "v${{ env.NEW_VERSION }}" | grep -q "v${{ env.NEW_VERSION }}"; then
            echo "Deleting existing tag v${{ env.NEW_VERSION }} for re-run..."
            git tag -d "v${{ env.NEW_VERSION }}" || true
            git push origin ":refs/tags/v${{ env.NEW_VERSION }}" || true
          fi
        fi
        
        # Commit Helm chart version update
        if ! git diff --quiet deploy/helm/aws-neuron-operator/Chart.yaml 2>/dev/null; then
          git add deploy/helm/aws-neuron-operator/Chart.yaml
          git commit -m "Release v${{ env.NEW_VERSION }}: update Helm chart version"
        fi
        
        # Create tag
        echo "Creating tag v${{ env.NEW_VERSION }}..."
        if ! git tag "v${{ env.NEW_VERSION }}"; then
          echo "Error: Failed to create tag"
          exit 1
        fi
        
        # Push commit + tag together
        echo "Pushing to remote..."
        for i in {1..3}; do
          if git push origin "$CURRENT_BRANCH" "v${{ env.NEW_VERSION }}"; then
            echo "✓ Pushed successfully"
            break
          elif [ $i -eq 3 ]; then
            echo "Error: Failed to push after 3 attempts"
            exit 1
          else
            echo "Push attempt $i failed, retrying..."
            sleep 5
          fi
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v${{ env.NEW_VERSION }}"
        name: "Release v${{ env.NEW_VERSION }}"
        body: |
          ## AWS Neuron Operator v${{ env.NEW_VERSION }}
          
          ### Supported Platforms
          
          - Red Hat OpenShift Service on AWS (ROSA) with HCP 4.19+
          - Red Hat OpenShift Container Platform (OCP) 4.19+
          - Instance types: inf1, inf2, trn1, trn1n
          
          DeviceConfig image defaults correspond to Neuron SDK 2.28.0. Override via Helm values if a newer SDK is available.
          
          ### Installation
          
          All methods install the operator with prerequisites (NFD, KMM). If you already have NFD or KMM, see options below to skip them.
          
          **Option 1: Install Script**
          ```bash
          git clone https://github.com/awslabs/operator-for-ai-chips-on-aws.git
          cd operator-for-ai-chips-on-aws
          git checkout v${{ env.NEW_VERSION }}
          
          # Full install (includes NFD + KMM)
          ./deploy/install.sh
          
          # Skip prereqs if already installed
          ./deploy/install.sh --skip-nfd --skip-kmm
          ```
          
          **Option 2: Helm**
          ```bash
          git clone https://github.com/awslabs/operator-for-ai-chips-on-aws.git
          cd operator-for-ai-chips-on-aws
          git checkout v${{ env.NEW_VERSION }}
          
          # Full install
          helm install neuron-operator deploy/helm/aws-neuron-operator/
          
          # Skip prereqs if already installed
          helm install neuron-operator deploy/helm/aws-neuron-operator/ \
            --set nfd.enabled=false --set kmm.enabled=false
          ```
          
          **Option 3: ArgoCD (OpenShift GitOps)**
          ```bash
          # Edit deploy/argocd/application.yaml to set nfd.enabled / kmm.enabled as needed
          oc apply -f https://raw.githubusercontent.com/awslabs/operator-for-ai-chips-on-aws/v${{ env.NEW_VERSION }}/deploy/argocd/application.yaml
          ```
          
          See [deploy/README.md](https://github.com/awslabs/operator-for-ai-chips-on-aws/blob/v${{ env.NEW_VERSION }}/deploy/README.md) for full details.
          
          ### Container Images
          
          - Operator: `public.ecr.aws/os-partners/neuron-openshift/operator:v${{ env.NEW_VERSION }}`
          - Bundle: `public.ecr.aws/os-partners/neuron-openshift/operator-bundle:v${{ env.NEW_VERSION }}`
          - Index: `public.ecr.aws/os-partners/neuron-openshift/operator-index:v${{ env.NEW_VERSION }}`
          
          ### Manual Install (advanced)
          
          For direct manifest installation without Helm or the install script:
          ```bash
          # Install NFD and KMM operators from OperatorHub first, then:
          kubectl apply -f https://github.com/awslabs/operator-for-ai-chips-on-aws/releases/download/v${{ env.NEW_VERSION }}/aws-neuron-operator.yaml
          kubectl apply -f https://github.com/awslabs/operator-for-ai-chips-on-aws/releases/download/v${{ env.NEW_VERSION }}/nfd-rule.yaml
          kubectl apply -f https://github.com/awslabs/operator-for-ai-chips-on-aws/releases/download/v${{ env.NEW_VERSION }}/deviceconfig-sample.yaml
          ```
        files: |
          release/${{ env.NEW_VERSION }}/aws-neuron-operator.yaml
          release/${{ env.NEW_VERSION }}/nfd-rule.yaml
          release/${{ env.NEW_VERSION }}/deviceconfig-sample.yaml
        generate_release_notes: true
