apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ""
  namespace: ""
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: neuron-dra-driver
      app.kubernetes.io/component: aws-neuron
      app.kubernetes.io/part-of: aws-neuron
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neuron-dra-driver
        app.kubernetes.io/component: aws-neuron
        app.kubernetes.io/part-of: aws-neuron
    spec:
      serviceAccountName: awslabs-gpu-operator-dra-driver
      hostNetwork: true
      containers:
      - name: neuron-dra-driver
        image: test-dra-driver-image:latest
        command:
        - k8s-neuron-dra-driver
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: CDI_ROOT
          value: /var/run/cdi
        - name: KUBELET_REGISTRAR_DIRECTORY_PATH
          value: /var/lib/kubelet/plugins_registry
        - name: KUBELET_PLUGINS_DIRECTORY_PATH
          value: /var/lib/kubelet/plugins
        - name: HEALTHCHECK_PORT
          value: "51515"
        resources:
          limits:
            cpu: 20m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - name: kubelet-plugins-dir
          mountPath: /var/lib/kubelet/plugins
        - name: kubelet-registry-dir
          mountPath: /var/lib/kubelet/plugins_registry
        - name: cdi-dir
          mountPath: /var/run/cdi
        livenessProbe:
          grpc:
            port: 51515
            service: liveness
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: kubelet-plugins-dir
        hostPath:
          path: /var/lib/kubelet/plugins
      - name: kubelet-registry-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry
      - name: cdi-dir
        hostPath:
          path: /var/run/cdi
