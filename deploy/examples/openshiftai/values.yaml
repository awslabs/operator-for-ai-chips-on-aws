serviceMesh:
  enabled: true
serverless:
  enabled: true
openshiftAI:
  channel: fast
servingRuntime:
  enabled: true
  namespace: neuron-inference
  image: registry.redhat.io/rhaiis/vllm-neuron-rhel9:3
  defaultModelName: meta-llama/Llama-3.1-8B-Instruct
  tensorParallelSize: 2
  maxNumSeqs: 4
  maxModelLen: 4096
compileCachePVC:
  enabled: true
  name: neuron-compile-cache
  storageClassName: gp3-csi
  size: 20Gi
