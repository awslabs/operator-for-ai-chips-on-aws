# Prerequisites - set to false if already installed in your cluster
nfd:
  enabled: true
kmm:
  enabled: true

# Operator namespace
namespace: aws-neuron-operator

# Operator install settings
channel: Stable
installPlanApproval: Automatic  # Set to Manual for production

# DeviceConfig image versions (Neuron SDK 2.28.0)
deviceConfig:
  driversVersion: "2.27.4.0"
  devicePluginVersion: "2.29.148.0"
  schedulerVersion: "v1.34.4-eks-1-34-16"
  schedulerExtensionVersion: "2.29.148.0"
  monitorVersion: "1.9.0"
