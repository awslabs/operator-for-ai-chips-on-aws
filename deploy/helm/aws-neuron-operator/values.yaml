# Prerequisites - set to false if already installed in your cluster
nfd:
  enabled: true
kmm:
  enabled: true

# Operator namespace
namespace: aws-neuron-operator

# Operator install settings
channel: Stable
installPlanApproval: Automatic  # Set to Manual for production

# DeviceConfig image versions (Neuron SDK 2.30.0)
deviceConfig:
  # mode: "dra" uses DRA driver; "devicePlugin" uses device-plugin + scheduler
  mode: "devicePlugin"
  driversVersion: "2.28.0.0"
  # devicePlugin mode images (mutually exclusive with draDriver)
  devicePluginVersion: "2.30.0.0"
  schedulerVersion: "v1.35.5-eks-1-35-10"
  schedulerExtensionVersion: "2.30.0.0"
  # DRA mode image (mutually exclusive with devicePlugin, scheduler, schedulerExtension)
  draDriverVersion: "1.0.1"
  # Monitoring (used in both modes)
  monitorVersion: "1.10.0"
