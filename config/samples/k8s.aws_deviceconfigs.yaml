apiVersion: k8s.aws/v1beta1
kind: DeviceConfig
metadata:
  name: device-config
  namespace:  aws-neuron-operator
spec:
  useInTreeDrivers: false
  driversImage: public.ecr.aws/os-partners/neuron-openshift/neuron-kernel-module:2.28.0.0
  devicePluginImage: public.ecr.aws/neuron/neuron-device-plugin:2.30.0.0
  customSchedulerImage: public.ecr.aws/eks-distro/kubernetes/kube-scheduler:v1.35.5-eks-1-35-10
  schedulerExtensionImage: public.ecr.aws/neuron/neuron-scheduler:2.30.0.0
  nodeMetricsImage: public.ecr.aws/neuron/neuron-monitor:1.10.0
  selector:
    feature.node.kubernetes.io/aws-neuron: "true"
